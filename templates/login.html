<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS影视媒体库管理系统 - 登录</title>
    <script src="/static/js/jquery.min.js"></script>
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-page">
    <!-- PC/Pad模式 -->
    <div class="login-pc-wrapper">
        <div class="login-card">
            <div class="login-logo-row">
                <img src="/static/img/logo.png" alt="MediaMaster" class="logo-img">
            </div>

            <h1 class="login-title">NAS媒体库管理系统</h1>

            <div class="error-message" id="error-message"></div>

            <form id="login_form" class="login-form" method="post">
                <div>
                    <label class="login-label">用户名</label>
                    <input type="text" name="username" class="input-field" placeholder="请输入用户名" required autocomplete="username">
                </div>

                <div>
                    <label class="login-label">密码</label>
                    <div class="login-password-wrapper">
                        <input type="password" name="password" class="input-field" placeholder="请输入密码" required autocomplete="current-password" id="password-input">
                        <span class="password-toggle" data-input-id="password-input">
                            <i class="bi bi-eye eye-icon" style="display: block;"></i>
                            <i class="bi bi-eye-slash eye-icon" style="display: none;"></i>
                        </span>
                    </div>
                </div>

                <div class="login-checkbox-row">
                    <div class="login-checkbox-group">
                        <input id="remember" type="checkbox" name="remember" class="login-checkbox">
                        <label for="remember" class="login-checkbox-label">自动登录</label>
                    </div>

                    <a style="display: none;" href="#" class="login-forgot-pw">忘记密码?</a>
                </div>

                <button type="submit" class="login-btn">登 录</button>
            </form>
        </div>

        <div class="login-footer-pc">
            <p class="login-footer-text">&copy;2024 - <span id="footer-year-pc"></span> Smysong. All Rights Reserved.</p>
            <p class="login-footer-version">NAS媒体库管理系统 | Version&#xFF1A;{{ version }}</p>
            <p class="login-footer-docs"><a href="/docs" target="_blank">产品文档</a></p>
        </div>
    </div>

    <!-- 移动APP模式 -->
    <div class="login-mobile-wrapper" id="mobile-wrapper">
        <header class="login-mobile-header">
            <img src="/static/img/logo.png" alt="MediaMaster Logo" class="logo-img-mobile">
        </header>

        <main class="login-mobile-main">
            <h1 class="login-title-mobile">NAS媒体库管理系统</h1>

            <div class="error-message" id="error-message-mobile"></div>

            <form id="login_form_mobile" class="login-form" method="post">
                <div>
                    <label class="login-label">用户名</label>
                    <input type="text" name="username" class="input-field" placeholder="请输入用户名" required autocomplete="username">
                </div>

                <div>
                    <label class="login-label">密码</label>
                    <div class="login-password-wrapper">
                        <input type="password" name="password" class="input-field" placeholder="请输入密码" required autocomplete="current-password" id="password-input-mobile">
                        <span class="password-toggle" data-input-id="password-input-mobile">
                            <i class="bi bi-eye eye-icon" style="display: block;"></i>
                            <i class="bi bi-eye-slash eye-icon" style="display: none;"></i>
                        </span>
                    </div>
                </div>

                <div class="login-checkbox-group">
                    <input id="remember-mobile" type="checkbox" name="remember" class="login-checkbox">
                    <label for="remember-mobile" class="login-checkbox-label">自动登录</label>
                </div>

                <button type="submit" class="login-btn">登 录</button>

                <div style="display: none;" class="login-forgot-row">
                    <a href="#" class="login-forgot-pw">忘记密码</a>
                </div>
            </form>
        </main>

        <footer class="login-mobile-footer">
            <p class="login-footer-text-mobile">&copy;2024 - <span id="footer-year-mobile"></span> Smysong. All Rights Reserved.</p>
            <p class="login-footer-version-mobile">NAS媒体库管理系统 | Version&#xFF1A;{{ version }}</p>
            <p class="login-footer-docs-mobile"><a href="/docs" target="_blank">产品文档</a></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 动态设置版权年份
            var currentYear = new Date().getFullYear();
            var yearPc = document.getElementById('footer-year-pc');
            var yearMobile = document.getElementById('footer-year-mobile');
            if (yearPc) yearPc.textContent = currentYear;
            if (yearMobile) yearMobile.textContent = currentYear;

            var isMobile = window.innerWidth <= 768 && window.innerWidth <= 375;
            var pcWrapper = document.querySelector('.login-pc-wrapper');
            var mobileWrapper = document.getElementById('mobile-wrapper');

            if (pcWrapper && mobileWrapper) {
                if (isMobile) {
                    pcWrapper.style.display = 'none';
                    mobileWrapper.classList.add('active');
                } else {
                    mobileWrapper.style.display = 'none';
                    pcWrapper.style.display = 'block';
                }
            }

            function handleLogin(form, errorEl) {
                $.ajax({
                    type: 'POST',
                    url: '/login',
                    data: $(form).serialize(),
                    success: function(response) {
                        if (response.success) {
                            errorEl.style.display = 'none';

                            var toast = document.createElement('div');
                            toast.className = 'login-toast';
                            toast.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#ffffff" d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/></svg> 登录成功！正在跳转...';
                            document.body.appendChild(toast);

                            setTimeout(function() {
                                toast.classList.add('hiding');
                                setTimeout(function() {
                                    toast.remove();
                                    window.location.href = response.redirect_url;
                                }, 300);
                            }, 2500);
                        } else {
                            errorEl.textContent = response.message;
                            errorEl.style.display = 'block';
                        }
                    },
                    error: function() {
                        errorEl.textContent = '网络错误，请稍后再试。';
                        errorEl.style.display = 'block';
                    }
                });
            }

            $('#login_form').on('submit', function(e) {
                e.preventDefault();
                handleLogin(this, document.getElementById('error-message'));
            });

            $('#login_form_mobile').on('submit', function(e) {
                e.preventDefault();
                handleLogin(this, document.getElementById('error-message-mobile'));
            });

            document.querySelectorAll('.password-toggle').forEach(function(toggle) {
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    var inputId = this.getAttribute('data-input-id');
                    var input = document.getElementById(inputId);
                    var eyeIcon = this.querySelector('.bi-eye');
                    var eyeSlashIcon = this.querySelector('.bi-eye-slash');

                    if (input && eyeIcon && eyeSlashIcon) {
                        if (input.type === 'password') {
                            input.type = 'text';
                            eyeIcon.style.display = 'none';
                            eyeSlashIcon.style.display = 'block';
                        } else {
                            input.type = 'password';
                            eyeIcon.style.display = 'block';
                            eyeSlashIcon.style.display = 'none';
                        }
                    }
                });
            });
        });
    </script>

    <!-- ========== 日间/夜间模式初始化 ========== -->
    <script>
        (function() {
            var THEME_KEY = 'mediamaster-theme';
            var savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- ========== 必应每日壁纸背景 ========== -->
    <script>
        (function() {
            var url = 'https://bing.img.run/uhd.php';
            var img = new Image();
            img.onload = function() {
                document.body.style.setProperty('--bing-wallpaper', 'url(' + url + ')');
            };
            img.onerror = function() {
                // 壁纸加载失败，CSS 中 var() 回退值会自动使用本地默认图
            };
            img.src = url;
        })();
    </script>

</body>
</html>
