<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品文档</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/page-styles.css">
    <link rel="stylesheet" href="/static/css/ui-components.css">
    <script>
    (function() {
        var theme = localStorage.getItem('mediamaster-theme');
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <script src="/static/js/jquery.min.js"></script>
<style>
.docs-page {
    display: flex;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

.docs-tree-panel {
    width: 280px;
    min-width: 240px;
    border-right: 1px solid var(--sidebar-border, rgba(128,128,128,0.2));
    background: var(--sidebar-bg);
    overflow-y: auto;
    transition: width 0.25s ease, min-width 0.25s ease;
    flex-shrink: 0;
}
.docs-tree-toggle {
    display: none;
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 24px;
    height: 48px;
    border: none;
    background: var(--sidebar-accent, #3db8b0);
    color: #fff;
    font-size: 14px;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
}

.docs-content-panel {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 2.5rem;
    background: var(--body-bg);
}
.docs-content-panel .doc-title {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--sidebar-accent, #3db8b0);
    color: var(--text-primary);
}
.docs-content-panel .doc-body {
    line-height: 1.85;
    color: var(--text-primary);
}
.docs-content-panel .doc-body h1,
.docs-content-panel .doc-body h2,
.docs-content-panel .doc-body h3 {
    color: var(--text-primary);
}
.docs-content-panel .doc-body h1 { font-size: 1.5rem; margin-top: 1.5rem; margin-bottom: 0.75rem; }
.docs-content-panel .doc-body h2 { font-size: 1.3rem; margin-top: 1.25rem; margin-bottom: 0.6rem; }
.docs-content-panel .doc-body h3 { font-size: 1.15rem; margin-top: 1rem; margin-bottom: 0.5rem; }
.docs-content-panel .doc-body pre {
    background: var(--card-bg);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
}
.docs-content-panel .doc-body code {
    font-size: 0.9em;
}
.docs-content-panel .doc-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
}
.docs-content-panel .doc-body th,
.docs-content-panel .doc-body td {
    border: 1px solid var(--sidebar-border, #dee2e6);
    padding: 0.5rem 0.75rem;
    text-align: left;
}
.docs-content-panel .doc-body th {
    background: var(--card-bg);
    font-weight: 600;
}
.docs-content-panel .doc-body img {
    max-width: 100%;
    border-radius: 6px;
}

/* welcome state */
.docs-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted, #6c757d);
    text-align: center;
}
.docs-welcome i {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.4;
}
.docs-welcome p {
    font-size: 1.1rem;
}

/* loading / error */
.docs-loading, .docs-error {
    padding: 2rem;
    text-align: center;
    color: var(--text-muted, #6c757d);
}
.docs-error { color: var(--danger, #dc3545); }

/* tree styles */
.tree-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
.tree-list ul {
    list-style: none;
    padding-left: 1.25rem;
    margin: 0;
}
.tree-item {
    position: relative;
}
.tree-dir-header {
    display: flex;
    align-items: center;
    padding: 6px 16px 6px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--sidebar-text);
    transition: background 0.15s ease;
    border-radius: 0;
}
.tree-dir-header:hover {
    background: var(--sidebar-user-hover, rgba(61,184,176,0.06));
}
.tree-dir-header i {
    font-size: 12px;
    margin-right: 6px;
    transition: transform 0.2s ease;
    min-width: 14px;
    text-align: center;
}
.tree-dir-header.collapsed i {
    transform: rotate(-90deg);
}
.tree-dir-header .bi-folder { color: var(--sidebar-accent, #3db8b0); margin-right: 6px; }

.tree-file-link {
    display: flex;
    align-items: center;
    padding: 5px 16px 5px 30px;
    font-size: 13px;
    color: var(--sidebar-text);
    text-decoration: none;
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s ease;
}
.tree-file-link:hover {
    background: var(--sidebar-user-hover, rgba(61,184,176,0.06));
    color: var(--sidebar-text-active, #3db8b0);
}
.tree-file-link.active {
    background: var(--sidebar-user-hover, rgba(61,184,176,0.1));
    color: var(--sidebar-text-active, #3db8b0);
    font-weight: 600;
}
.tree-file-link i {
    margin-right: 6px;
    font-size: 12px;
    color: var(--text-muted, #6c757d);
}

/* responsive */
@media (max-width: 1199px) {
    .docs-tree-panel {
        width: 240px;
        min-width: 240px;
    }
    .docs-tree-panel.collapsed {
        width: 0;
        min-width: 0;
        overflow: hidden;
        border-right: none;
    }
    .docs-tree-toggle {
        display: block;
    }
    .docs-content-panel {
        padding: 1.5rem 1.5rem;
    }
}

@media (max-width: 767px) {
    .docs-page {
        position: relative;
    }
    .docs-tree-panel {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 20;
        width: 280px;
        min-width: 280px;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.1);
    }
    .docs-tree-panel.open {
        transform: translateX(0);
    }
    .docs-tree-panel.collapsed {
        width: 0;
        min-width: 0;
        transform: translateX(-100%);
    }
    .docs-tree-toggle {
        display: block;
    }
    .docs-content-panel {
        padding: 1rem 1.25rem;
    }
}
</style>
</head>
<body>

<div class="docs-page">
    <div class="docs-tree-panel" id="docsTreePanel">
        <div class="docs-loading" style="padding:1.5rem;">加载目录...</div>
    </div>
    <button class="docs-tree-toggle" id="docsTreeToggle" title="目录">
        <i class="bi bi-list"></i>
    </button>
    <div class="docs-content-panel" id="docsContentPanel">
        <div class="docs-welcome">
            <i class="bi bi-book"></i>
            <p>请从左侧目录选择文档</p>
        </div>
    </div>
</div>

<script src="/static/js/marked.min.js"></script>
<script>
(function() {
    var treePanel = document.getElementById('docsTreePanel');
    var contentPanel = document.getElementById('docsContentPanel');
    var treeToggle = document.getElementById('docsTreeToggle');
    var currentDocPath = null;

    // --- Tree Render ---
    function buildTree(children, level) {
        if (!children || children.length === 0) return '';
        var ul = document.createElement('ul');
        ul.className = 'tree-list';
        children.forEach(function(item) {
            var li = document.createElement('li');
            li.className = 'tree-item';
            if (item.type === 'dir') {
                var header = document.createElement('div');
                header.className = 'tree-dir-header';
                header.innerHTML = '<i class="bi bi-chevron-down"></i><i class="bi bi-folder"></i>' + escHtml(item.name);
                header.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var subUl = li.querySelector(':scope > ul');
                    if (subUl) {
                        var collapsing = !header.classList.contains('collapsed');
                        header.classList.toggle('collapsed');
                        subUl.style.display = collapsing ? 'none' : '';
                    }
                });
                li.appendChild(header);
                var subUl = document.createElement('ul');
                subUl.className = 'tree-list';
                (item.children || []).forEach(function(child) {
                    subUl.appendChild(buildLeaf(child));
                });
                li.appendChild(subUl);
            } else {
                li = buildLeaf(item);
            }
            ul.appendChild(li);
        });
        return ul;
    }

    function buildLeaf(item) {
        var li = document.createElement('li');
        li.className = 'tree-item';
        var a = document.createElement('a');
        a.className = 'tree-file-link';
        a.href = '#/' + item.path;
        a.innerHTML = '<i class="bi bi-file-text"></i>' + escHtml(item.name);
        a.setAttribute('data-doc-path', item.path);
        a.addEventListener('click', function(e) {
            e.preventDefault();
            loadDoc(item.path);
        });
        li.appendChild(a);
        return li;
    }

    function escHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function loadTree() {
        fetch('/docs/api/list')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                treePanel.innerHTML = '';
                if (!data.tree || data.tree.length === 0) {
                    treePanel.innerHTML = '<div class="docs-loading" style="padding:1.5rem;">暂无文档</div>';
                    return;
                }
                var ul = buildTree(data.tree, 0);
                treePanel.appendChild(ul);
                // restore active from hash
                restoreFromHash();
            })
            .catch(function(err) {
                treePanel.innerHTML = '<div class="docs-error" style="padding:1.5rem;">目录加载失败</div>';
            });
    }

    function setActive(path) {
        var links = treePanel.querySelectorAll('.tree-file-link');
        links.forEach(function(l) { l.classList.remove('active'); });
        if (path) {
            var active = treePanel.querySelector('[data-doc-path="' + CSS.escape(path) + '"]');
            if (active) {
                active.classList.add('active');
                // expand parent dirs
                expandParents(active);
            }
        }
    }

    function expandParents(el) {
        var parent = el.closest('li');
        while (parent) {
            var header = parent.querySelector(':scope > .tree-dir-header');
            if (header && header.classList.contains('collapsed')) {
                header.classList.remove('collapsed');
                var subUl = parent.querySelector(':scope > ul');
                if (subUl) subUl.style.display = '';
            }
            parent = parent.parentElement ? parent.parentElement.closest('li') : null;
        }
    }

    // --- Content Loading ---
    function loadDoc(path) {
        if (currentDocPath === path) return;
        currentDocPath = path;
        contentPanel.innerHTML = '<div class="docs-loading"><div class="spinner-border spinner-border-sm" role="status"></div> 加载中...</div>';
        setActive(path);
        updateHash(path);

        fetch('/docs/api/content/' + encodeURIComponent(path))
            .then(function(res) {
                if (!res.ok) throw new Error('Not found');
                return res.json();
            })
            .then(function(data) {
                contentPanel.innerHTML =
                    '<div class="doc-title">' + escHtml(data.title) + '</div>' +
                    '<div class="doc-body">' + marked.parse(data.content) + '</div>';
            })
            .catch(function(err) {
                contentPanel.innerHTML = '<div class="docs-error">文档加载失败：文件不存在或无法读取</div>';
                currentDocPath = null;
            });
    }

    // --- Hash Routing ---
    function updateHash(path) {
        if (history.pushState) {
            history.pushState(null, '', '#/' + path);
        } else {
            location.hash = '#/' + path;
        }
    }

    function restoreFromHash() {
        var hash = location.hash;
        if (hash && hash.startsWith('#/')) {
            var path = hash.substring(2);
            if (path) loadDoc(path);
        }
    }

    window.addEventListener('hashchange', function() {
        var hash = location.hash;
        if (hash && hash.startsWith('#/')) {
            var path = hash.substring(2);
            if (path && path !== currentDocPath) loadDoc(path);
        }
    });

    // --- Toggle (tablet collapse / mobile overlay) ---
    treeToggle.addEventListener('click', function() {
        if (window.innerWidth <= 767) {
            treePanel.classList.toggle('open');
        } else {
            treePanel.classList.toggle('collapsed');
        }
    });
    // close overlay tree when clicking content or tree item on mobile
    contentPanel.addEventListener('click', function() {
        if (window.innerWidth <= 767) {
            treePanel.classList.remove('open');
        }
    });
    treePanel.addEventListener('click', function(e) {
        if (window.innerWidth <= 767 && e.target.closest('.tree-file-link')) {
            treePanel.classList.remove('open');
        }
    });

    // --- Init ---
    loadTree();
})();
</script>

</body>
</html>
